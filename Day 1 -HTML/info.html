<!DOCTYPE html>
<html>
<head>
    <title>Update Information</title>
</head>
<body>

<h1>Update Information</h1>
<p>Use the form below to edit your information.</p>

<form>
    <p>
        <label><i>First name:</i></label>
        <input type="text" value="Bruce">
    </p>

    <p>
        <label><i>Last name:</i></label>
        <input type="text" value="Phillips">
    </p>

    <p>
        <label><i>Favorite sport:</i></label>
        <!-- Default dropdown (blue + vertical arrows) -->
        <select>
            <option selected>basketball</option>
            <option>football</option>
            <option>cricket</option>
            <option>tennis</option>
        </select>
    </p>

    <p>
        <label><i>Gender:</i></label>
        <input type="radio" name="gender"> male
        <input type="radio" name="gender"> female
        <input type="radio" name="gender" checked> not sure
    </p>

    <p>
        <label><i>State resident:</i></label>
        <!-- Default dropdown (blue + vertical arrows) -->
        <select>
            <option selected>Kansas</option>
            <option>Texas</option>
            <option>California</option>
            <option>Florida</option>
        </select>
    </p>

    <p>
        <input type="checkbox" checked> 21 or older
    </p>

    <p>
        <label><i>Car models owned:</i></label><br>
        <input type="checkbox" checked> Ford
        <input type="checkbox"> Chrysler
        <input type="checkbox"> Toyota
        <input type="checkbox" checked> Nissan
    </p>

    <!-- Save button aligned RIGHT -->
    <p align="right">
        <input type="submit" value="Save Changes">
    </p>
</form>

</body>
</html>
