<!DOCTYPE html>
<html>
<head>
    <title>User Application Form</title>
</head>
<body>

<form>
<table border="1" cellpadding="10" cellspacing="0" align="center">
    <tr>
        <td>

            <!-- Inner table (NO borders) -->
            <table border="0" cellpadding="6" cellspacing="0" width="100%">
                <tr>
                    <td colspan="2" align="center">
                        <font color="red"><b>User Application Form</b></font>
                    </td>
                    <td align="right">
                        <input type="submit" value="Submit">
                    </td>
                </tr>

                <tr>
                    <td>First Name</td>
                    <td colspan="2">
                        <input type="text">
                    </td>
                </tr>

                <tr>
                    <td>Last Name</td>
                    <td colspan="2">
                        <input type="text">
                    </td>
                </tr>

                <tr>
                    <td>Gender</td>
                    <td colspan="2">
                        <input type="radio" name="g"> Male
                        <input type="radio" name="g"> Female
                    </td>
                </tr>

                <tr>
                    <td>Address</td>
                    <td colspan="2">
                        <textarea rows="3" cols="30"></textarea>
                    </td>
                </tr>

                <tr>
                    <td>Email Id</td>
                    <td colspan="2">
                        <input type="text">
                    </td>
                </tr>
            </table>

        </td>
    </tr>
</table>
</form>

</body>
</html>
